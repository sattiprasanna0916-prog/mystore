{% extends 'theme.html' %}
{% block main %}
<div class="container">
    <div class="row mt-3">
        <!-- Categories List -->
        <div class="col-lg-3">
            <div class="list-group border shadow">
                <a href="/" class="mb-1">
                    <button class="btn btn-outline-dark" style="width:10rem;">
                        All Products
                    </button>
                </a>
                {% for j in categories %}
                <a href="/?category={{ j.id }}" class="mb-1">
                    <button class="btn btn-outline-dark" style="width:10rem;">
                        {{ j.name }}
                    </button>
                </a>
                {% endfor %}
            </div>
        </div>

        <!-- Products -->
        <div class="col-lg-9">
            <div class="row">
                {% for i in products %}
                <div class="col-lg-4">
                    <div class="card mb-5 shadow" style="width:15rem;height:30rem;">
                        <div class="card-header text-center">
                            <img src="{{ i.image.url }}" width="200px" height="200px" class="img-fluid">
                        </div>
                        <div class="card-body">
                            <h5>{{ i.name }}</h5>
                            <h5>Price: ₹{{ i.price }}</h5>
                        </div>
                        <div class="card-footer text-center">
                            <a href="{% url 'book_now' i.id %}" class="btn btn-primary mb-2">Book Now</a>


                            <form method="POST" action="{% url 'add_to_cart' i.id %}">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-outline-success">Add to Cart</button>
                            </form>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
